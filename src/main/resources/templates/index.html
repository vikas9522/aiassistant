<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            margin: 0;
        }

        .chat-container {
             width: 100%;
            max-width: 500px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            margin-top: 20px;
        }

        .header {
            padding: 15px;
            background: #4f46e5;
            color: white;
            font-size: 18px;
            text-align: center;
            border-radius: 10px 10px 0 0;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .user {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .ai {
            background: #e5e7eb;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #4f46e5;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        .typing {
            display: inline-block;
        }

        .typing span {
            animation: blink 1.4s infinite both;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }

        .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 15px;
    font-size: 12px;
    color: #6b7280;
    border-top: 1px solid #eee;
    background: #fafafa;
    border-radius: 0 0 10px 10px;
}

.footer .brand {
    color: #4f46e5;
    font-weight: 600;
}
        @media (max-width: 600px) {
    .chat-container {
        height: 100vh;
        border-radius: 0;
        margin-top: 0;
    }
}
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">🤖 Vikas AI Assistant</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="question" placeholder="Ask something..." />
        <button onclick="askAI()">Send</button>
    </div>
    <div class="footer">
    <div class="footer-left">
        © 2026 Vikas AI Assistant
    </div>
    <div class="footer-right">
        Powered by <span class="brand">Sarvam AI</span>
    </div>
</div>
</div>

<script>
function addMessage(text, type) {
    const chatBox = document.getElementById("chatBox");
    const message = document.createElement("div");
    message.classList.add("message", type);

    if (type === "ai") {
        message.innerHTML = marked.parse(text);  // 🔥 Markdown support
    } else {
        message.innerText = text;
    }

    chatBox.appendChild(message);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function askAI() {
    const input = document.getElementById("question");
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";

    const typingMessage = document.createElement("div");
    typingMessage.classList.add("message", "ai");
    typingMessage.innerHTML = `<div class="typing">
        <span>.</span><span>.</span><span>.</span>
    </div>`;
    document.getElementById("chatBox").appendChild(typingMessage);

    fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: question })
    })
    .then(response => response.text())
    .then(data => {
        typingMessage.remove();
        addMessage(data, "ai");
    })
    .catch(error => {
        typingMessage.remove();
        addMessage("Error connecting to AI.", "ai");
    });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
